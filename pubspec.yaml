name: fixy
description: "Plataforma de asesorias y proyectos para estudiantes Tecsup."
publish_to: "none"
version: 1.1.4+7

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Models (codegen)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # Utils
  intl: ^0.20.1
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1

  # Auto-update via GitHub Releases
  package_info_plus: ^8.1.1
  dio: ^5.7.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Iconos del launcher (Android + iOS)
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
    - assets/icon_foreground.png
    - assets/avatars/
    - assets/medals/

# Iconos de la app generados con: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  # iOS no soporta transparencia: usa el robot con fondo brand
  background_color_ios: "#1A4CA3"
  image_path_ios: "assets/icon_foreground.png"
  # Android: adaptive icon con foreground (robot) sobre fondo brand
  adaptive_icon_background: "#1A4CA3"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  image_path_android: "assets/icon_foreground.png"
